name: MLflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check environment
        run: |
          python --version
          pip --version
          docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 docker
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Find MLflow model artifact
        id: find_model
        shell: bash
        run: |
          MODEL_PATH=$(find MLProject/mlruns -path "*/artifacts/model/MLmodel" | head -n 1 | xargs dirname)
          echo "MODEL_PATH=$MODEL_PATH"

          if [ -z "$MODEL_PATH" ]; then
            echo "Model artifact tidak ditemukan."
            find MLProject/mlruns -maxdepth 5 -type f
            exit 1
          fi

          echo "model_path=$MODEL_PATH" >> "$GITHUB_OUTPUT"

      - name: Check logged model environment
        run: |
          echo "Model path: ${{ steps.find_model.outputs.model_path }}"
          echo "===== python_env.yaml ====="
          cat "${{ steps.find_model.outputs.model_path }}/python_env.yaml" || true
          echo "===== conda.yaml ====="
          cat "${{ steps.find_model.outputs.model_path }}/conda.yaml" || true
          echo "===== requirements.txt ====="
          cat "${{ steps.find_model.outputs.model_path }}/requirements.txt" || true

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifacts
          path: MLProject/mlruns/

      - name: Build Docker Model
        run: mlflow models build-docker -m "${{ steps.find_model.outputs.model_path }}" -n credit-scoring-model --enable-mlserver --env-manager pip

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: docker tag credit-scoring-model:latest ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest